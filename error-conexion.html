<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error de Conexión - MinsaCita</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="body-fecha" style="background:#F7FAFC; display:flex; justify-content:center; align-items:center; min-height:100vh; margin:0;">
    <div class="contenedor" style="background:white; min-height:100vh; display:flex; flex-direction:column; width:100%; max-width:480px;">
        <header class="header-roles" style="border-bottom: 1px solid #E2E8F0; padding: 16px 20px;">
            <div class="logo-minsa-simple">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="#004481" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Logo Minsacita">
                    <rect width="24" height="24" fill="#004481"/>
                    <path d="M12 3L4 7v6c0 5.55 3.84 10.74 8 12 4.16-1.26 8-6.45 8-12V7l-8-4zm-1 11H9v-2h2V9h2v4h2v2h-2v2h-2v-2z" fill="white"/>
                </svg>
                <span class="logo-text">MINSACITA</span>
            </div>
        </header>

        <main id="contenido-error" style="flex:1; display:flex; align-items:center; justify-content:center; padding:20px;">
            <div style="background:white; border:1px solid #E2E8F0; width:100%; max-width:320px; box-shadow:0 4px 6px rgba(0,0,0,0.05); position:relative; overflow:hidden;">
                
                <div style="padding:32px 24px; text-align:center;">
                    <div style="width:64px; height:64px; background:#FED7D7; display:inline-flex; align-items:center; justify-content:center; margin-bottom:24px;">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#C53030" stroke-width="2" aria-hidden="true"><line x1="1" y1="1" x2="23" y2="23"></line><path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"></path><path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"></path><path d="M10.71 5.05A16 16 0 0 1 22.58 9"></path><path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"></path><path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path><line x1="12" y1="20" x2="12.01" y2="20"></line></svg>
                    </div>

                    <h1 style="color:#0B2B46; font-size:18px; font-weight:700; margin:0 0 12px 0;">Sin conexión a internet</h1>
                    <p style="color:#4A5568; font-size:13px; margin:0 0 32px 0; line-height:1.5;">No hemos podido comunicarnos con los servidores del MINSA. Por favor, verifica tu conexión de red o el estado de tus datos móviles.</p>

                    <div style="display:flex; flex-direction:column; gap:12px; margin-bottom:24px;">
                        <button class="btn-primario btn-full" style="padding:12px; display:flex; justify-content:center; align-items:center;">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true" style="margin-right:8px;"><polyline points="1 4 1 10 7 10"></polyline><polyline points="23 20 23 14 17 14"></polyline><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"></path></svg>
                            Reintentar
                        </button>
                        <a href="index.html" class="btn-outline btn-full text-center" style="padding:12px; display:flex; justify-content:center; align-items:center; text-decoration:none;">
                            Volver al Inicio
                        </a>
                    </div>
                </div>

                <div style="border-top:1px solid #E2E8F0; padding:16px; text-align:center; display:flex; align-items:center; justify-content:center; gap:8px;">
                    <div style="width:8px; height:8px; background:#C53030;"></div>
                    <span style="font-size:10px; font-weight:700; letter-spacing:1px; color:#4A5568;">SISTEMA DESCONECTADO</span>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
