<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MinsaCita</title>
    <!-- Criterio 11: Tipografía -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="contenedor contenedor-login">
        <!-- CRITERIO 9: Skip Link -->
        <a href="#formulario" class="skip-link">Saltar al formulario</a>

        <!-- Header simplificado -->
        <header class="header-login">
            <!-- CRITERIO 1: Alt text en imágenes SVG -->
            <div class="logo-minsa-simple">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="#004481" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Logo Minsacita">
                    <rect width="24" height="24" fill="#004481"/>
                    <path d="M12 3L4 7v6c0 5.55 3.84 10.74 8 12 4.16-1.26 8-6.45 8-12V7l-8-4zm-1 11H9v-2h2V9h2v4h2v2h-2v2h-2v-2z" fill="white"/>
                </svg>
                <span class="logo-text">MINSACITA</span>
            </div>
        </header>

        <!-- CRITERIO 10: Estructura Semántica (main) -->
        <main class="main-login p-20">
            <div class="step-indicator" aria-label="Paso 1 de 5">
                [PASO 1 DE 5: IDENTIFICACIÓN]
            </div>

            <!-- CRITERIO 8: Formularios con labels visibles y autocomplete -->
            <form id="formulario" onsubmit="return validarLogin(event)" class="login-form">
                
                <div class="grupo-form">
                    <label for="documento">Número de Documento (DNI/CE)</label>
                    <div class="input-with-icon">
                        <!-- CRITERIO 5: aria-hidden en íconos decorativos -->
                        <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#718096" stroke-width="2" aria-hidden="true">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                            <polyline points="14 2 14 8 20 8"></polyline>
                            <line x1="16" y1="13" x2="8" y2="13"></line>
                            <line x1="16" y1="17" x2="8" y2="17"></line>
                            <polyline points="10 9 9 9 8 9"></polyline>
                        </svg>
                        <input type="text" id="documento" name="documento" required autocomplete="username" placeholder="Ingrese su documento">
                    </div>
                    <!-- CRITERIO 7: Instrucciones explicativas para evitar errores -->
                    <p class="form-help">Solo números o letras según corresponda.</p>
                </div>

                <div class="grupo-form">
                    <label for="password">Contraseña</label>
                    <div class="input-with-icon">
                        <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#718096" stroke-width="2" aria-hidden="true">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                        <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="Ingrese su contraseña">
                        <!-- CRITERIO 6: Botón táctil grande -->
                        <button type="button" class="btn-toggle-password" aria-label="Mostrar contraseña">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#718096" stroke-width="2" aria-hidden="true">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="grupo-form checkbox-group">
                    <input type="checkbox" id="recuerda" name="recuerda">
                    <label for="recuerda" class="label-checkbox">Recuerda mi cuenta</label>
                </div>

                <fieldset class="captcha-section">
                    <legend class="sr-only">Validación de Seguridad</legend>
                    <div class="captcha-header">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#4A5568" stroke-width="2" aria-hidden="true">
                            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                        </svg>
                        <span class="captcha-title">Validación de Seguridad</span>
                    </div>
                    
                    <div class="captcha-container">
                        <div class="captcha-box-new" aria-label="Imagen del código de seguridad: X 7 K 9 M">X 7 K 9 M</div>
                        <button type="button" class="btn-refresh-captcha" aria-label="Recargar código de seguridad">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#004481" stroke-width="2" aria-hidden="true">
                                <polyline points="23 4 23 10 17 10"></polyline>
                                <polyline points="1 20 1 14 7 14"></polyline>
                                <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                            </svg>
                        </button>
                    </div>
                    
                    <label for="captcha" class="sr-only">Ingrese el código de seguridad</label>
                    <input type="text" id="captcha" name="captcha" class="input-captcha" required autocomplete="off" placeholder="INGRESE EL CÓDIGO">
                </fieldset>

                <!-- CRITERIO 6: Área táctil > 44px y CRITERIO 3: Navegación teclado -->
                <button type="submit" class="btn-primario btn-ingresar">INGRESAR</button>

                <div class="login-links">
                    <a href="registro-ciudadano.html" class="link-register">Regístrate aquí</a>
                    <a href="recuperacion-clave.html" class="link-forgot">¿Olvidaste tu contraseña?</a>
                </div>
            </form>
        </main>

        <script>
            function validarLogin(e) {
                e.preventDefault();
                var dni = document.getElementById('documento').value;
                if(dni === '000123000') {
                    window.location.href = 'dashboard.html';
                } else {
                    alert('Acceso denegado. Para Ciudadano, por favor ingrese el DNI: 000123000');
                }
            }
        </script>

        <footer class="footer-login">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#4A5568" stroke-width="2" aria-hidden="true">
                <path d="M3 18v-6a9 9 0 0 1 18 0v6"></path>
                <path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"></path>
            </svg>
            <span>Soporte Técnico MINSA</span>
        </footer>
    </div>
</body>

</html>
