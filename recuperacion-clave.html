<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Acceso - MinsaCita</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="body-fecha" style="background:#F7FAFC;">
    <div class="contenedor" style="background:white; min-height:100vh;">
        <a href="#contenido-recuperar" class="skip-link">Saltar al contenido principal</a>

        <header class="header-roles" style="border-bottom: 1px solid #E2E8F0; padding: 16px 20px; display:flex; align-items:center;">
            <a href="login.html" aria-label="Volver atrás" style="color:#4A5568; display:flex; align-items:center; text-decoration:none; margin-right:12px;">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            </a>
            <div class="logo-minsa-simple">
                <span class="logo-text" style="color:#0B2B46; margin-left:0;">MINSACITA</span>
            </div>
        </header>

        <main id="contenido-recuperar" class="p-20" style="display:flex; justify-content:center;">
            <div style="background:white; border:1px solid #E2E8F0; padding:24px; margin-top:16px; width:100%; max-width:400px;">
                <h1 style="color:#0B2B46; font-size:20px; font-weight:700; text-align:center; margin:0 0 12px 0;">Recuperar Acceso</h1>
                <p style="color:#4A5568; font-size:13px; text-align:center; margin:0 0 24px 0; line-height:1.5;">Ingrese su documento de identidad y seleccione cómo desea recibir el código de verificación.</p>

                <form>
                    <div style="margin-bottom:24px;">
                        <label for="dni" style="display:block; font-size:12px; font-weight:600; color:#1A202C; margin-bottom:8px;">Número de DNI</label>
                        <!-- CRITERIO 8: input con label asociado -->
                        <input type="text" id="dni" class="input-registro" placeholder="Ej. 12345678" style="padding:12px;" aria-required="true">
                    </div>

                    <div style="margin-bottom:24px;" role="group" aria-labelledby="metodo-envio">
                        <span id="metodo-envio" style="display:block; font-size:12px; font-weight:600; color:#1A202C; margin-bottom:12px; border-bottom:1px solid #E2E8F0; padding-bottom:8px;">Método de envío</span>
                        
                        <!-- Opción 1: SMS -->
                        <label style="display:flex; align-items:center; gap:12px; border:1px solid #E2E8F0; padding:12px; margin-bottom:12px; cursor:pointer;">
                            <input type="radio" name="metodo" value="sms" checked style="width:20px; height:20px; accent-color:#004481;">
                            <div style="flex:1;">
                                <span style="display:block; font-size:13px; font-weight:600; color:#1A202C;">Mensaje de Texto (SMS)</span>
                                <span style="display:block; font-size:11px; color:#718096;">Al celular registrado terminado en ***45</span>
                            </div>
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#A0AEC0" stroke-width="2" aria-hidden="true"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
                        </label>

                        <!-- Opción 2: Correo -->
                        <label style="display:flex; align-items:center; gap:12px; border:1px solid #E2E8F0; padding:12px; cursor:pointer;">
                            <input type="radio" name="metodo" value="email" style="width:20px; height:20px; accent-color:#004481;">
                            <div style="flex:1;">
                                <span style="display:block; font-size:13px; font-weight:600; color:#1A202C;">Correo Electrónico</span>
                                <span style="display:block; font-size:11px; color:#718096;">A j***@gmail.com</span>
                            </div>
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#A0AEC0" stroke-width="2" aria-hidden="true"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                        </label>
                    </div>

                    <div style="display:flex; flex-direction:column; gap:12px;">
                        <!-- CRITERIO 6 -->
                        <button type="submit" class="btn-primario btn-full" style="padding:14px;">Enviar Código</button>
                        <a href="login.html" class="btn-outline btn-full text-center" style="padding:14px; text-decoration:none;">Cancelar</a>
                    </div>
                </form>
            </div>
        </main>
    </div>
</body>
</html>
