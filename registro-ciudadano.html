<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Ciudadano - MinsaCita</title>
    <!-- Criterio 11: Tipografía -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="contenedor contenedor-registro">
        <!-- CRITERIO 9: Skip Link -->
        <a href="#formulario-registro" class="skip-link">Saltar al formulario</a>

        <!-- Header -->
        <header class="header-registro">
            <div class="logo-minsa-simple">
                <!-- CRITERIO 1: Alt text con aria-label -->
                <svg width="20" height="20" viewBox="0 0 24 24" fill="#004481" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Logo Minsacita">
                    <rect width="24" height="24" fill="#004481"/>
                    <path d="M12 3L4 7v6c0 5.55 3.84 10.74 8 12 4.16-1.26 8-6.45 8-12V7l-8-4zm-1 11H9v-2h2V9h2v4h2v2h-2v2h-2v-2z" fill="white"/>
                </svg>
                <span class="logo-text">MINSACITA</span>
            </div>
            <!-- CRITERIO 5 y 6: Botón icono con aria-label y área táctil >= 44px -->
            <a href="index.html" aria-label="Volver atrás" class="btn-back">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#2D3748" stroke-width="2" aria-hidden="true">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
            </a>
        </header>

        <main class="main-registro p-20">
            <div class="registro-header-box">
                <h1 class="registro-title">Registro de Ciudadano</h1>
                <p class="registro-subtitle">Complete sus datos para crear una cuenta oficial.</p>
            </div>

            <!-- CRITERIO 8: Etiquetas visibles e inputs con autocomplete -->
            <form id="formulario-registro" action="dashboard.html" class="registro-form">
                
                <div class="grupo-form">
                    <label for="tipo_doc">Tipo de Documento</label>
                    <select id="tipo_doc" name="tipo_doc" class="input-registro" required>
                        <option value="DNI" selected>DNI</option>
                        <option value="CE">CE</option>
                    </select>
                </div>

                <div class="grupo-form">
                    <label for="num_doc">Número de Documento</label>
                    <input type="text" id="num_doc" name="num_doc" class="input-registro" required placeholder="Ej: 12345678">
                    <!-- CRITERIO 7: Instrucciones explicativas -->
                    <p class="form-help">Ingrese el número sin espacios ni guiones.</p>
                </div>

                <div class="grupo-form">
                    <label for="nombre">Nombre Completo</label>
                    <input type="text" id="nombre" name="nombre" class="input-registro" required autocomplete="name" placeholder="Nombres y Apellidos">
                </div>

                <div class="grupo-form">
                    <label for="correo">Correo Electrónico</label>
                    <input type="email" id="correo" name="correo" class="input-registro" required autocomplete="email" placeholder="ejemplo@correo.com">
                </div>

                <div class="grupo-form">
                    <label for="pass_registro">Crear Contraseña</label>
                    <div class="input-with-icon">
                        <input type="password" id="pass_registro" name="pass_registro" class="input-registro" style="padding-right:44px;" required autocomplete="new-password" placeholder="••••••••">
                        <button type="button" class="btn-toggle-password" aria-label="Ocultar contraseña">
                            <!-- Ícono de ojo tachado -->
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#718096" stroke-width="2" aria-hidden="true">
                                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                                <line x1="1" y1="1" x2="23" y2="23"></line>
                            </svg>
                        </button>
                    </div>
                    <!-- Indicador visual de fuerza de contraseña -->
                    <div class="password-strength" aria-hidden="true">
                        <div class="strength-bar red"></div>
                        <div class="strength-bar"></div>
                        <div class="strength-bar"></div>
                        <div class="strength-bar"></div>
                    </div>
                    <p class="form-help">La contraseña debe tener al menos 8 caracteres, números y letras.</p>
                </div>

                <div class="grupo-form checkbox-group terminos-group">
                    <input type="checkbox" id="terminos" name="terminos" required>
                    <!-- CRITERIO 2 y 4: Contraste de los enlaces, foco visible en estilos, area táctil en label -->
                    <label for="terminos" class="label-checkbox">
                        Declaro que la información proporcionada es verdadera y acepto los <a href="#" class="link-bold">Términos y Condiciones</a> y la <a href="#" class="link-bold">Política de Privacidad</a> del Minsa.
                    </label>
                </div>

                <!-- CRITERIO 6: Botón principal -->
                <button type="submit" class="btn-primario btn-crear-cuenta">
                    CREAR CUENTA OFICIAL
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" aria-hidden="true" style="margin-left: 8px;">
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                        <polyline points="12 5 19 12 12 19"></polyline>
                    </svg>
                </button>
            </form>
        </main>
    </div>
</body>
</html>
