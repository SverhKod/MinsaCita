<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selección de Sede - MinsaCita</title>
    <!-- Criterio 11: Tipografía -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="body-sede">
    <div class="contenedor contenedor-sede">
        <!-- CRITERIO 9: Skip Link -->
        <a href="#contenido-sede" class="skip-link">Saltar al contenido principal</a>

        <header class="header-modal">
            <div class="modal-icon">
                <!-- CRITERIO 5: aria-hidden -->
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#004481" stroke-width="2" aria-hidden="true">
                    <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path>
                    <rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect>
                    <line x1="12" y1="11" x2="12" y2="17"></line>
                    <line x1="9" y1="14" x2="15" y2="14"></line>
                </svg>
            </div>
            <!-- CRITERIO 6: area táctil -->
            <a href="dashboard.html" class="btn-close-modal" aria-label="Cerrar y volver al dashboard">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#4A5568" stroke-width="2" aria-hidden="true">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </a>
        </header>

        <!-- CRITERIO 10: main -->
        <main id="contenido-sede" class="main-sede p-20">
            <!-- Progress Steps -->
            <div class="steps-container" aria-label="Progreso: Paso 2 de 5">
                <div class="step-circle completed">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" aria-hidden="true">
                        <polyline points="20 6 9 17 4 12"></polyline>
                    </svg>
                </div>
                <div class="step-line completed"></div>
                <div class="step-circle active" aria-current="step">2</div>
                <div class="step-line"></div>
                <div class="step-circle">3</div>
                <div class="step-line"></div>
                <div class="step-circle">4</div>
                <div class="step-line"></div>
                <div class="step-circle">5</div>
            </div>

            <h1 class="sede-title">Selección de Sede y Especialidad</h1>
            <p class="sede-subtitle">Por favor, elija el establecimiento de salud y la especialidad médica requerida para continuar con su cita.</p>

            <form action="seleccion-medico.html" class="form-sede">
                <!-- CRITERIO 8: label asociado -->
                <div class="grupo-form form-box">
                    <label for="sede" class="label-bold">Seleccionar Sede / Establecimiento del MINSA</label>
                    <select id="sede" name="sede" class="input-registro select-icon" required>
                        <option value="" disabled selected>Elija un establecimiento</option>
                        <option value="loayza">Hospital Nacional Arzobispo Loayza</option>
                        <option value="dosdemayo">Hospital Nacional Dos de Mayo</option>
                    </select>
                </div>

                <div class="grupo-form form-box">
                    <label for="especialidad" class="label-bold">Seleccionar Especialidad Médica</label>
                    <select id="especialidad" name="especialidad" class="input-registro select-icon" required>
                        <option value="" disabled selected>Primero seleccione una sede</option>
                        <option value="cardiologia">Cardiología</option>
                        <option value="medicinageneral">Medicina General</option>
                    </select>
                    <!-- CRITERIO 7: Helper para evitar errores -->
                    <p class="form-help">Las especialidades disponibles dependen de la sede seleccionada.</p>
                </div>

                <div class="botones-bottom">
                    <!-- CRITERIO 6: area táctil amplia -->
                    <button type="submit" class="btn-primario btn-full">
                        Siguiente
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" aria-hidden="true" style="margin-left: 8px;">
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                            <polyline points="12 5 19 12 12 19"></polyline>
                        </svg>
                    </button>
                    <a href="dashboard.html" class="btn-secundario btn-full btn-outline">
                        Volver
                    </a>
                </div>
            </form>
        </main>

        <footer class="footer-sede">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#4A5568" stroke-width="2" aria-hidden="true">
                <path d="M3 18v-6a9 9 0 0 1 18 0v6"></path>
                <path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"></path>
            </svg>
            Soporte Técnico MINSA
        </footer>
    </div>
</body>
</html>
