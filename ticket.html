<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cita Reservada - MinsaCita</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="body-fecha" style="background-color: #F7FAFC; display:flex; justify-content:center; align-items:center; min-height: 100vh; margin:0;">
    <div class="contenedor text-center" style="background-color: #F7FAFC; display:flex; flex-direction:column; justify-content:center; padding: 20px;">
        <main id="contenido-ticket">
            <div class="success-icon" style="background-color:#0B2B46; width:64px; height:64px; border-radius:4px; display:inline-flex; align-items:center; justify-content:center; margin-bottom:24px;">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" aria-hidden="true"><polyline points="20 6 9 17 4 12"></polyline></svg>
            </div>
            
            <h1 class="ticket-title" style="color:#0B2B46; font-size:22px; font-weight:700; margin-bottom:12px; margin-top:0; line-height:1.2;">¡CITA RESERVADA<br>EXITOSAMENTE!</h1>
            
            <p class="ticket-desc" style="color:#4A5568; font-size:14px; margin-bottom:32px; line-height:1.5;">
                Su solicitud ha sido procesada. Por favor, conserve el código de atención para presentar en admisión el día de su cita.
            </p>

            <div class="codigo-box" style="background-color:#EBF4FF; border:1px solid #CBD5E0; padding:24px; margin-bottom:32px;">
                <p style="color:#4A5568; font-size:12px; font-weight:600; letter-spacing:1px; margin-top:0; margin-bottom:8px;">CÓDIGO DE ATENCIÓN</p>
                <p style="color:#0B2B46; font-size:28px; font-weight:700; margin:0; letter-spacing:2px;">MIN-8472-A</p>
            </div>

            <div class="botones-bottom" style="display:flex; flex-direction:column; gap:12px;">
                <button class="btn-outline btn-full" style="display:flex; align-items:center; justify-content:center;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true" style="margin-right:8px;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                    DESCARGAR TICKET (PDF)
                </button>
                <a href="dashboard.html" class="btn-primario btn-full text-center" style="text-decoration:none;">
                    FINALIZAR Y SALIR
                </a>
            </div>
        </main>
    </div>
</body>
</html>
